<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Nature Core AI</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  background:#0f172a;
  color:white;
  min-height:100vh;
}

header{
  padding:30px 20px;
  text-align:center;
}

header h1{
  font-size:42px;
  color:#22c55e;
  margin-bottom:10px;
}

header p{
  color:#cbd5e1;
  max-width:700px;
  margin:auto;
  line-height:1.6;
}

.hero{
  padding:20px;
  display:flex;
  justify-content:center;
}

.search-box{
  width:100%;
  max-width:700px;
  background:#1e293b;
  border-radius:20px;
  padding:15px;
  box-shadow:0 0 25px rgba(0,0,0,0.3);
}

.search-box input{
  width:100%;
  padding:18px;
  border:none;
  border-radius:15px;
  background:#0f172a;
  color:white;
  font-size:16px;
  outline:none;
}

.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:20px;
  padding:20px;
  max-width:1100px;
  margin:auto;
}

.stat-card{
  background:#1e293b;
  padding:25px;
  border-radius:20px;
  text-align:center;
}

.stat-card h2{
  color:#22c55e;
  font-size:32px;
}

.stat-card p{
  color:#cbd5e1;
  margin-top:10px;
}

.cards{
  padding:30px 20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:25px;
  max-width:1300px;
  margin:auto;
}

.card{
  background:#1e293b;
  border-radius:25px;
  padding:25px;
  transition:0.3s;
  position:relative;
  overflow:hidden;
}

.card:hover{
  transform:translateY(-6px);
}

.card h2{
  color:#22c55e;
  margin-bottom:8px;
}

.scientific{
  color:#94a3b8;
  margin-bottom:15px;
  font-style:italic;
}

.badges{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:15px;
}

.badge{
  background:#334155;
  padding:8px 14px;
  border-radius:30px;
  font-size:12px;
}

.section{
  margin-top:18px;
}

.section h4{
  margin-bottom:10px;
  color:#f8fafc;
}

.tag{
  display:inline-block;
  background:#14532d;
  color:#dcfce7;
  padding:8px 12px;
  border-radius:20px;
  margin:5px 5px 0 0;
  font-size:13px;
}

.premium-overlay{
  margin-top:20px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  padding:18px;
  border-radius:18px;
}

.premium-overlay h3{
  color:#facc15;
  margin-bottom:10px;
}

.unlock-btn{
  margin-top:15px;
  background:#22c55e;
  color:white;
  border:none;
  padding:12px 18px;
  border-radius:14px;
  cursor:pointer;
  font-size:14px;
}

.loading{
  text-align:center;
  padding:40px;
  color:#cbd5e1;
}

footer{
  padding:40px 20px;
  text-align:center;
  color:#94a3b8;
}

</style>

</head>

<body>

<header>

<h1>Nature Core AI</h1>

<p>
AI-powered herbal intelligence platform for medicine,
skincare, nutrition, chemistry, and botany.
</p>

</header>

<section class="hero">

<div class="search-box">

<input
type="text"
id="searchInput"
placeholder="Search acne, malaria, ginger, ulcer..."
/>

</div>

</section>

<section class="stats">

<div class="stat-card">
<h2>3</h2>
<p>Medicinal Plants</p>
</div>

<div class="stat-card">
<h2>11</h2>
<p>Conditions</p>
</div>

<div class="stat-card">
<h2>Free + Premium</h2>
<p>Knowledge Levels</p>
</div>

</section>

<div class="loading" id="loading">
Loading herbal intelligence...
</div>

<section class="cards" id="cards"></section>

<footer>
Nature Core AI © 2026 • Herbal Intelligence System
</footer>

<script>

const API_URL =
"http://localhost:4000/nature";

const cardsContainer =
document.getElementById("cards");

const loading =
document.getElementById("loading");

const searchInput =
document.getElementById("searchInput");

async function loadNature(search = "") {

loading.style.display = "block";

cardsContainer.innerHTML = "";

try {

const response = await fetch(
search
? `${API_URL}?search=${search}`
: API_URL
);

const data = await response.json();

loading.style.display = "none";

if(data.length === 0){

cardsContainer.innerHTML =
"<p>No herbal intelligence found.</p>";

return;

}

data.forEach(item => {

const card =
document.createElement("div");

card.className = "card";
card.onclick = () => openModal(item);
card.innerHTML = `

<h2>${item.name}</h2>

<p class="scientific">
${item.scientificName}
</p>

<div class="badges">

<span class="badge">
${item.type}
</span>

<span class="badge">
${item.category}
</span>

<span class="badge">
${item.level.toUpperCase()}
</span>

</div>

<div class="section">

<h4>Benefits</h4>

${item.benefits.map(b => `
<span class="tag">${b}</span>
`).join("")}

</div>

<div class="section">

<h4>Conditions</h4>

${item.conditions.map(c => `
<span class="tag">${c}</span>
`).join("")}

</div>

<div class="section">

<h4>Skincare Uses</h4>

${item.skincareUses.map(s => `
<span class="tag">${s}</span>
`).join("")}

</div>

${item.premiumLocked ? `

<div class="premium-overlay">

<h3>
🔒 Premium Herbal Intelligence
</h3>

<p>
Advanced chemistry,
dosage systems,
AI medicinal analysis,
and clinical-level knowledge
require premium access.
</p>

<button class="unlock-btn">
Unlock Premium
</button>

</div>

` : ""}

`;

cardsContainer.appendChild(card);

});

} catch(error){

loading.innerHTML =
"Failed to load Nature Core AI.";

console.error(error);

}

}

searchInput.addEventListener(
"input",
(e)=>{
loadNature(e.target.value);
});

loadNature();
function openModal(item){

const modal = document.createElement("div");

modal.id = "modal";

modal.style.position = "fixed";
modal.style.top = "0";
modal.style.left = "0";
modal.style.width = "100%";
modal.style.height = "100%";
modal.style.background = "rgba(0,0,0,0.85)";
modal.style.zIndex = "9999";
modal.style.overflowY = "auto";
modal.style.padding = "20px";

modal.innerHTML = `

<div style="
max-width:700px;
margin:40px auto;
background:#1e293b;
padding:30px;
border-radius:25px;
position:relative;
">

<button onclick="closeModal()"
style="
position:absolute;
right:20px;
top:20px;
background:red;
color:white;
border:none;
padding:10px 14px;
border-radius:10px;
cursor:pointer;
">
X
</button>

<h1 style="color:#22c55e;">
${item.name}
</h1>

<p style="
color:#94a3b8;
margin-bottom:20px;
font-style:italic;
">
${item.scientificName}
</p>

<h3>Benefits</h3>

<p>${item.benefits.join(", ")}</p>

<h3 style="margin-top:20px;">
Conditions
</h3>

<p>${item.conditions.join(", ")}</p>

<h3 style="margin-top:20px;">
Skincare Uses
</h3>

<p>${item.skincareUses.join(", ")}</p>

<h3 style="margin-top:20px;">
Preparation
</h3>

<p>${item.preparation}</p>

<h3 style="margin-top:20px;">
Warnings
</h3>

<p>${item.warnings}</p>

${
item.premiumLocked
?
`

<div style="
margin-top:30px;
background:#0f172a;
padding:20px;
border-radius:20px;
border:1px solid #334155;
">

<h2 style="color:#facc15;">
🔒 Premium Herbal Intelligence
</h2>

<p style="margin-top:10px;">
Unlock:
advanced chemistry,
dosage systems,
AI medicinal analysis,
research intelligence,
and clinical herbal explanations.
</p>

<button style="
margin-top:15px;
background:#22c55e;
color:white;
border:none;
padding:14px 20px;
border-radius:14px;
font-size:16px;
cursor:pointer;
">
Upgrade to Premium
</button>

</div>

`
:
""
}

</div>

`;

document.body.appendChild(modal);

}

function closeModal(){

const modal =
document.getElementById("modal");

if(modal){
modal.remove();
}

}
</script>

</body>
</html>
