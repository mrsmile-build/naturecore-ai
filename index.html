<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nature Core AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#020617;
color:white;
padding:20px;
}

header{
text-align:center;
margin-top:30px;
margin-bottom:40px;
}

header h1{
font-size:50px;
color:#22c55e;
margin-bottom:10px;
}

header p{
color:#cbd5e1;
max-width:700px;
margin:auto;
line-height:1.6;
}

.search-box{
max-width:700px;
margin:30px auto;
background:#1e293b;
padding:14px;
border-radius:20px;
}

.search-box input{
width:100%;
padding:18px;
border:none;
outline:none;
border-radius:14px;
background:#0f172a;
color:white;
font-size:16px;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin:40px 0;
}

.stat-card{
background:#1e293b;
padding:30px;
border-radius:20px;
text-align:center;
}

.stat-card h2{
font-size:40px;
color:#22c55e;
}

.stat-card p{
margin-top:10px;
color:#cbd5e1;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
margin-top:40px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:20px;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card h2{
color:#22c55e;
margin-bottom:10px;
}

.scientific{
color:#94a3b8;
font-style:italic;
margin-bottom:15px;
}

.tag{
display:inline-block;
background:#334155;
padding:6px 12px;
border-radius:20px;
margin:5px 5px 0 0;
font-size:13px;
}

.premium{
background:#facc15;
color:black;
}

.loading{
text-align:center;
margin-top:40px;
color:#cbd5e1;
}

footer{
text-align:center;
margin-top:80px;
color:#94a3b8;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:flex;
justify-content:center;
align-items:center;
padding:20px;
z-index:9999;
}

.modal-content{
background:#1e293b;
padding:30px;
border-radius:20px;
max-width:700px;
width:100%;
max-height:90vh;
overflow-y:auto;
position:relative;
}

.close-btn{
position:absolute;
right:20px;
top:20px;
background:red;
border:none;
color:white;
padding:10px 14px;
border-radius:10px;
cursor:pointer;
}

</style>
</head>

<body>

<header>

<h1>Nature Core AI</h1>

<p>
AI-powered herbal intelligence platform for medicine,
skincare, nutrition, chemistry, and botany.
</p>

</header>

<div class="search-box">

<input
type="text"
id="searchInput"
placeholder="Search acne, malaria, ginger..."
>

</div>

<div class="stats">

<div class="stat-card">
<h2>3</h2>
<p>Medicinal Plants</p>
</div>

<div class="stat-card">
<h2>11</h2>
<p>Conditions</p>
</div>

<div class="stat-card">
<h2>Free + Premium</h2>
<p>Knowledge Levels</p>
</div>

</div>

<div class="loading" id="loading">
Loading Nature Core AI...
</div>

<div class="cards" id="cards"></div>

<footer>
Nature Core AI © 2026 • Herbal Intelligence System
</footer>

<script>

const API_URL = "https://naturecore-ai.onrender.com/nature";
"https://naturecore-ai.onrender.com/api/plants";

const cards =
document.getElementById("cards");

const loading =
document.getElementById("loading");

const searchInput =
document.getElementById("searchInput");

let plants = [];

async function fetchPlants(){

try{

const response =
await fetch(API_URL);

plants =
await response.json();

loading.style.display="none";

loadPlants();

}catch(error){

loading.innerHTML =
"Failed to load Nature Core AI.";

console.log(error);

}

}

function loadPlants(search=""){

cards.innerHTML="";

const filtered =
plants.filter(item=>

item.name.toLowerCase().includes(search.toLowerCase()) ||

item.conditions.join(" ").toLowerCase()
.includes(search.toLowerCase())

);

filtered.forEach(item=>{

const card =
document.createElement("div");

card.className="card";

card.onclick=()=>openModal(item);

card.innerHTML=`

<h2>${item.name}</h2>

<p class="scientific">
${item.scientificName}
</p>

${item.conditions.map(condition=>`
<span class="tag">${condition}</span>
`).join("")}

<br><br>

${item.premiumLocked
?
'<span class="tag premium">🔒 Premium</span>'
:
''
}

`;

cards.appendChild(card);

});

}

function openModal(item){

const modal =
document.createElement("div");

modal.className="modal";

modal.innerHTML=`

<div class="modal-content">

<button class="close-btn"
onclick="this.parentElement.parentElement.remove()">
X
</button>

<h1 style="color:#22c55e;">
${item.name}
</h1>

<p class="scientific">
${item.scientificName}
</p>

<h3>Benefits</h3>
<p>${item.benefits.join(", ")}</p>

<h3 style="margin-top:20px;">
Conditions
</h3>

<p>${item.conditions.join(", ")}</p>

<h3 style="margin-top:20px;">
Preparation
</h3>

<p>${item.preparation}</p>

<h3 style="margin-top:20px;">
Warnings
</h3>

<p>${item.warnings}</p>

${item.premiumLocked
?
`
<div style="
margin-top:30px;
background:#0f172a;
padding:20px;
border-radius:20px;
">

<h2 style="color:#facc15;">
🔒 Premium Herbal Intelligence
</h2>

<p style="margin-top:10px;">
Advanced medicinal analysis,
dosage intelligence,
AI chemistry,
and research system.
</p>

</div>
`
:
''
}

</div>

`;

document.body.appendChild(modal);

}

searchInput.addEventListener("input",(e)=>{
loadPlants(e.target.value);
});

fetchPlants();

</script>

</body>
</html>
