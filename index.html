<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nature Core AI</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:#fff;
}

header{
  text-align:center;
  padding:20px;
}

h1{
  color:#22c55e;
}

.search{
  display:flex;
  justify-content:center;
  padding:10px;
}

input{
  width:90%;
  max-width:500px;
  padding:12px;
  border-radius:10px;
  border:none;
  outline:none;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:15px;
  padding:20px;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:15px;
  cursor:pointer;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.03);
}

.tag{
  display:inline-block;
  background:#334155;
  padding:5px 10px;
  margin:3px;
  border-radius:20px;
  font-size:12px;
}

.lock{
  color:#facc15;
  font-size:12px;
}

.modal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  padding:20px;
}

.modal-content{
  background:#111827;
  padding:20px;
  border-radius:15px;
}

button{
  margin-top:10px;
  padding:10px;
  border:none;
  background:#22c55e;
  color:#000;
  border-radius:10px;
}
</style>
</head>

<body>

<header>
<h1>Nature Core AI</h1>
<p>Herbal Intelligence System</p>
</header>

<div class="search">
<input id="search" placeholder="Search acne, malaria, neem..." />
</div>

<div class="grid" id="grid"></div>

<div class="modal" id="modal">
<div class="modal-content">
<h2 id="mName"></h2>
<p id="mSci"></p>
<p id="mInfo"></p>

<div id="premium" style="display:none; color:#facc15;">
🔒 Premium: Advanced chemistry & dosage locked
</div>

<button onclick="closeModal()">Close</button>
</div>
</div>

<script>
const API = "https://nature-core.onrender.com/nature";
let data = [];

async function load(){
  const res = await fetch(API);
  data = await res.json();
  render(data);
}

function render(list){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  list.forEach(item=>{
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${item.name}</h3>
      <p>${item.scientificName}</p>
      <div>
        ${item.conditions?.slice(0,3).map(c=>`<span class="tag">${c}</span>`).join("")}
      </div>
      ${item.level === "premium" ? "<div class='lock'>🔒 Premium</div>" : ""}
    `;

    div.onclick = ()=> openModal(item);
    grid.appendChild(div);
  });
}

function openModal(item){
  document.getElementById("modal").style.display="block";
  document.getElementById("mName").innerText=item.name;
  document.getElementById("mSci").innerText=item.scientificName;
  document.getElementById("mInfo").innerText=
    "Benefits: " + (item.benefits?.join(", ") || "");

  document.getElementById("premium").style.display =
    item.level === "premium" ? "block" : "none";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

document.getElementById("search").addEventListener("input",(e)=>{
  const q = e.target.value.toLowerCase();
  render(data.filter(d =>
    d.name.toLowerCase().includes(q) ||
    d.conditions?.some(c=>c.toLowerCase().includes(q))
  ));
});

load();
</script>

</body>
</html>
